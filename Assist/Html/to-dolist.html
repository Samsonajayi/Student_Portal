<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="../Css/dashboard.css">
    <link rel="stylesheet" href="../Css/toDo.css">
    <title>To-Do List</title>
</head>
<body>
    <div class="dashboard">
        <div class="dashboard-sidebar">
            <div class="sidebar-header">
                <a href="../Html/dashboard.html"><img src="../Images/main-logo.png" alt="logo"></a>
            </div>
            <ul class="sidebar-menu">
                <li><a href="../Html/dashboard.html"><i class="fa-solid fa-house"></i>Dashboard</a></li>
                <li><a href="../Html/course.html"><i class="fa-solid fa-book-open"></i>My Courses</a></li>
                <li><a href="../Html/to-dolist.html" class="active"><i class="fa-solid fa-list-check"></i>To-Do List</a></li>
                <li><a href="../Html/calculator.html"><i class="fa-solid fa-calculator"></i>Calculator</a></li>
                <li><a href="../Html/gallery.html"><i class="fa-solid fa-image"></i>Gallery</a></li>
            </ul>
            <ul class="sidebar-footer">
                <li><a href=""><i class="fa-solid fa-right-from-bracket"></i>Logout</a></li>
            </ul>
        </div>

        <div class="dashboard-content">
            <header class="dashboard-header">
                <div class="header-search">
                    <input type="text" placeholder="Search anything">
                    <i class="fa-solid fa-magnifying-glass search"></i>
                </div>
                <div class="header-user">
                    <img src="../Images/profile.png" alt="User avatar">
                    <div class="user-details">
                        <h3>John Doe</h3>
                        <span>Student</span>
                    </div>
                </div>
            </header>

            <section class="todo-page">
                <div class="page-header">
                    <h1>To-Do List</h1>
                    <p>Track your tasks, stay organized, and finish study goals.</p>
                </div>

                <div class="todo-app">
                    <form id="todo-form" class="todo-form">
                        <input type="text" id="todo-input" placeholder="Add a new task" autocomplete="off">
                        <button type="submit" class="btn-add"><i class="fa-solid fa-plus"></i> Add Task</button>
                    </form>

                    <div class="todo-summary">
                        <span id="task-count">0 tasks</span>
                        <button id="clear-completed" class="btn-clear-completed">Clear Completed</button>
                    </div>

                    <ul class="task-list" id="task-list"></ul>
                </div>
            </section>
        </div>
    </div>

    <script src="../Script/todo.js"></script>
</body>
</html>
