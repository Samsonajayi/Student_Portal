<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="../Css/dashboard.css">
    <link rel="stylesheet" href="../Css/gallery.css">
        <link rel="icon" href="../Images/main-logo.png" type="image/x-icon">
    <title>Gallery</title>
</head>
<body>
    <div class="dashboard">
            <div class="dashboard-sidebar">
            <div class="sidebar-header">
                <a href="../Html/dashboard.html"><img src="../Images/main-logo.png" alt="logo"></a>
            </div>
            <ul class="sidebar-menu">
                <li><a href="../Html/dashboard.html"><i class="fa-solid fa-house"></i> <span>Dashboard</span></a></li>
                <li><a href="../Html/course.html"><i class="fa-solid fa-book-open"></i><span> My Courses</span></a></li>
                <li><a href="../Html/to-dolist.html"><i class="fa-solid fa-list-check"></i><span>To-Do List</span></a></li>
                <li><a href="../Html/calculator.html"><i class="fa-solid fa-calculator"></i><span>Calculator</span></a></li>
                <li><a href="../Html/gallery.html"><i class="fa-solid fa-image"></i><span>Gallery</span></a></li>
            </ul>
            <ul class="sidebar-footer">
                <li><a href="../Auth/signin.html"><i class="fa-solid fa-right-from-bracket"></i><Span>Logout</Span></a></li>
            </ul>
        </div>


        <div class="dashboard-content">
            <header class="dashboard-header">
                <div class="header-search">
                    <input type="text" placeholder="Search anything">
                    <i class="fa-solid fa-magnifying-glass search"></i>
                </div>
                <div class="header-user">
                    <div class="live-clock">
                        <span id="live-datetime">--:--:--</span>
                    </div>
                    <img src="../Images/profile.png" alt="User avatar">
                    <div class="user-details">
                        <h3>John Doe</h3>
                        <span>Student</span>
                    </div>
                </div>
            </header>

            <section class="gallery-page">
                <div class="page-header">
                    <h1>Gallery</h1>
                    <p>Browse images from your student activities.</p>
                </div>

                <div class="gallery-grid" id="gallery-grid">
                    <figure class="gallery-item"><img src="../Images/Gallary (1).jpg" alt="HTML5 logo"></figure>
                    <figure class="gallery-item"><img src="../Images/Gallary (2).jpg" alt="CSS3 logo"></figure>
                    <figure class="gallery-item"><img src="../Images/Gallary (3).jpg" alt="JavaScript"></figure>
                    <figure class="gallery-item"><img src="../Images/Gallary (4).jpg" alt="React logo"></figure>
                    <figure class="gallery-item"><img src="../Images/Gallary (5).jpg" alt="Bootstrap logo"></figure>
                    <figure class="gallery-item"><img src="../Images/Gallary (6).jpg" alt="About"></figure>
                    <figure class="gallery-item"><img src="../Images/Gallary (7).jpg" alt="Assignment"></figure>
                    <figure class="gallery-item"><img src="../Images/Gallary (8).jpg" alt="Cherry blossom"></figure>
                    <figure class="gallery-item"><img src="../Images/Gallary (9).jpg" alt="Graduation"></figure>
                </div>

                <!-- Lightbox -->
                <div id="lightbox" class="lightbox" aria-hidden="true">
                    <button class="lightbox-close" id="lightbox-close"><i class="fa-solid fa-xmark"></i></button>
                    <button class="lightbox-nav lightbox-prev" id="lightbox-prev"><i class="fa-solid fa-chevron-left"></i></button>
                    <img id="lightbox-image" src="" alt="">
                    <button class="lightbox-nav lightbox-next" id="lightbox-next"><i class="fa-solid fa-chevron-right"></i></button>
                </div>
            </section>
        </div>
    </div>

    <script src="../Script/gallery.js"></script>
    <script src="../Script/dashboard.js"></script>
</body>
</html>
