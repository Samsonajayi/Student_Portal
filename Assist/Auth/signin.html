<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../Css/auth.css">
    <link rel="icon" href="Assist/Images/main-logo.png" type="image/x-icon">
    <title>Sign-In</title>
</head>
<body>
    <div class="container">
    <form action="submit" method="get">
        <h1>Welcome Back</h1>
        <p>Login to your account</p>
        <p><input type="email" placeholder="Email Address" required></p>
        <p><input type="password" placeholder="Password" required></p>
        <span><input type="checkbox" required>Remember Me</span>
        <p><button type="submit">Login</button></p>
        <span>Already have an account? <a href="../Auth/register.html">Register</a></span>
        
        
    </form>
    </div>

    <script src="../Script/login.js"></script>
</body>
</html>
