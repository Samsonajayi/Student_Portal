<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../Css/auth.css">
    <link rel="icon" href="Assist/Images/main-logo.png" type="image/x-icon">
    <title>Register</title>
</head>
<body>
    <div class="container">
    <form action="submit" method="get">
        <h1>Create Your Account</h1>
        <p>Join us and start your learning Journey</p>
        <p><input type="name" placeholder="Full Name" required></p>
        <p><input type="email" placeholder="Email Address" required></p>
        <p><input type="number" placeholder="Phone Number" required></p>
        <p><select name="gender" required>
            <option value="">Select Gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
        </select></p>
        <p><select name="department" id="" required>
            <option value="">Select Department</option>
            <option value="computer-science">Fullstack</option>
            <option value="mathematics">Front-end</option>
            <option value="physics">Back-end</option>
            <option value="chemistry">Data Analysis</option>
        </select></p>
        <p><input type="password" placeholder="Password" required></p>
        <p><input type="password" placeholder="Confirm Password" required></p>
        <span><input type="checkbox" required> I agree to the <a href="#">Terms and Conditions</a></span>
        <p><button type="submit">Register</button></p>
        <span>Already have an account? <a href="../Auth/signin.html">Login</a></span>
    </form>
    </div>

    <script src="../Script/register.js"></script>
</body>
</html>
